<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#6456D4;--primary-dark:#5046C0;--primary-light:rgba(100,86,212,.2);--accent:#C9456A;--bg:#0C1220;--bg-card:#131929;--bg-card2:#17203A;--text:#E8E4F4;--text-muted:rgba(180,175,210,.75);--text-light:rgba(150,145,190,.55);--border:rgba(255,255,255,.1);--border-light:rgba(255,255,255,.06);--error:#F87171;--error-bg:rgba(248,113,113,.12);--sel-border:#A07830;--sel-text:#E8B860;--heading:'Fraunces',Georgia,serif;--body:'Source Sans 3',-apple-system,sans-serif;--radius:12px;--radius-lg:20px;--shadow-sm:0 1px 2px rgba(0,0,0,.3);--shadow:0 4px 24px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.06)}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--body);color:var(--text);background:var(--bg);min-height:100vh;min-height:100svh;line-height:1.6;overflow-x:hidden;overflow-y:auto;overscroll-behavior:none;-webkit-overflow-scrolling:touch;touch-action:manipulation}
body.on-results{overflow-x:hidden;overflow-y:auto;overscroll-behavior:auto;touch-action:manipulation}
.hero{min-height:100vh;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1.5rem;background:#0C1220;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(91,77,199,.18) 0%,transparent 65%),radial-gradient(ellipse 60% 50% at 85% 100%,rgba(91,77,199,.1) 0%,transparent 60%);pointer-events:none}
.hero::after{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(255,255,255,.018) 39px,rgba(255,255,255,.018) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(255,255,255,.018) 39px,rgba(255,255,255,.018) 40px);pointer-events:none}
.hero-rule{width:40px;height:2px;background:linear-gradient(90deg,transparent,rgba(165,148,255,.6),transparent);margin:0 auto 1.75rem;border-radius:2px}
.hero-eyebrow{font-family:var(--body);font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(165,148,255,.75);margin-bottom:1.4rem}
.hero-badge{display:none}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.hero h1{font-family:var(--heading);font-size:min(5vw,2.2rem);font-weight:700;line-height:1.1;color:#F0EDF8;margin-bottom:1.25rem;white-space:nowrap;letter-spacing:-.02em}
.hero-divider{width:56px;height:1px;background:linear-gradient(90deg,transparent,rgba(165,148,255,.5),transparent);margin:0 auto 1.5rem;border-radius:1px}
.hero-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:1.4rem 2rem 1.5rem;max-width:460px;width:100%;backdrop-filter:blur(10px);box-shadow:0 4px 32px rgba(0,0,0,.25),0 0 0 1px rgba(255,255,255,.04),0 0 60px rgba(100,86,212,.07);margin-bottom:.25rem}
.hero-sub{font-family:'DM Sans',sans-serif;font-size:1rem;color:rgba(210,205,235,.95);max-width:420px;line-height:1.7;font-weight:400;margin-bottom:.5rem}
.hero-sub:last-child{margin-bottom:0}
.hero-meta{display:flex;align-items:center;gap:0;margin:2.25rem 0 2.75rem;font-size:.82rem;color:rgba(185,180,215,.88);border:1px solid rgba(255,255,255,.08);border-radius:100px;padding:.5rem .25rem;background:rgba(255,255,255,.03);backdrop-filter:blur(4px)}
.hero-meta-item{display:flex;align-items:center;gap:6px;padding:.1rem 1.1rem}
.hero-meta-item+.hero-meta-item{border-left:1px solid rgba(255,255,255,.08)}
.hero-meta-item svg{width:14px;height:14px;color:rgba(165,148,255,.7);flex-shrink:0}
.btn-hero{font-family:var(--body);font-size:.95rem;font-weight:600;letter-spacing:.04em;padding:.95rem 2.8rem;border-radius:100px;border:none;cursor:pointer;color:#fff;background:linear-gradient(135deg,#6456D4 0%,#5046C0 100%);box-shadow:0 0 0 1px rgba(100,86,212,.4),0 4px 20px rgba(91,77,199,.45),0 1px 3px rgba(0,0,0,.4);transition:all .2s ease;position:relative;overflow:hidden}
.btn-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.1) 0%,transparent 60%);border-radius:inherit}
.btn-hero:hover{background:linear-gradient(135deg,#7063DC 0%,#5B50CC 100%);box-shadow:0 0 0 1px rgba(112,99,220,.5),0 6px 28px rgba(91,77,199,.55),0 1px 3px rgba(0,0,0,.4);transform:translateY(-1px)}
.btn-hero:active{transform:translateY(0)}
.explainer{min-height:100vh;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1.5rem;background:var(--bg);position:relative}
.explainer::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(100,86,212,.12) 0%,transparent 60%);pointer-events:none}
.explainer-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem 2rem;max-width:540px;width:100%;box-shadow:var(--shadow);animation:fadeIn .5s ease;position:relative;z-index:1}
.btn-explainer-back{display:block;margin:1.25rem auto 0;background:transparent;border:none;color:var(--text-light);font-family:var(--body);font-size:.85rem;cursor:pointer;padding:.4rem .8rem;opacity:.7;transition:opacity .15s ease;position:relative;z-index:1}
.btn-explainer-back:hover{opacity:1;color:var(--primary)}
.explainer h2{font-family:var(--heading);font-size:1.6rem;font-weight:700;margin-bottom:.5rem;color:var(--text)}
.explainer-sub{font-family:'DM Sans',sans-serif;font-size:1rem;color:rgba(200,196,230,.92);font-weight:400;line-height:1.65;margin-bottom:2rem}
.explainer-label{font-family:var(--heading);font-size:1rem;font-weight:600;color:var(--text-muted);margin-bottom:1.25rem;font-style:italic}
.explainer-demo{margin-bottom:2rem}
.tri-container{position:relative;padding:0 .5rem}
.tri-numbers{display:flex;justify-content:space-between;margin-bottom:.6rem;position:relative;z-index:2}
.tri-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.9rem;color:var(--text-muted);background:rgba(255,255,255,.06);border:2px solid var(--border);opacity:0;animation:numIn .35s ease forwards}
.tri-num:nth-child(1){animation-delay:.3s}.tri-num:nth-child(2){animation-delay:.45s}.tri-num:nth-child(3){animation-delay:.6s}.tri-num:nth-child(4){animation-delay:.75s}.tri-num:nth-child(5){animation-delay:.9s}
@keyframes numIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tri-shape{position:relative;height:28px;margin:0 18px;overflow:hidden;opacity:0;animation:triGrow .8s ease 1.15s forwards}
@keyframes triGrow{from{opacity:0;clip-path:polygon(0% 100%,0% 100%,0% 100%)}to{opacity:1;clip-path:polygon(0% 100%,100% 100%,100% 0%)}}
.tri-shape-inner{width:100%;height:100%;background:linear-gradient(90deg,rgba(100,86,212,.25),rgba(100,86,212,.7));border-radius:0 4px 4px 0;clip-path:polygon(0% 100%,100% 100%,100% 0%)}
.tri-labels{display:flex;margin-top:.6rem}
.tri-label-l,.tri-label-m,.tri-label-r{font-size:.75rem;font-weight:500;color:var(--text-light);opacity:0;animation:numIn .35s ease 1.35s forwards;flex:1}
.tri-label-l{text-align:left}
.tri-label-m{text-align:center}
.tri-label-r{text-align:right;color:var(--primary);font-weight:600}
.explainer-note{font-size:.88rem;color:var(--text-muted);line-height:1.6;margin-bottom:2rem;opacity:0;animation:numIn .4s ease 1.55s forwards}
.explainer-note strong{color:var(--text);font-weight:600}
.survey-shell{max-width:700px;margin:0 auto;padding:0 1.5rem 0;min-height:100vh;min-height:100svh;display:flex;flex-direction:column;background:var(--bg)}
.progress-container{padding:1.25rem 0 .75rem;flex-shrink:0;border-bottom:1px solid var(--border-light)}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.progress-title{font-family:var(--heading);font-size:1.1rem;font-weight:700;color:var(--text);letter-spacing:-.02em;text-transform:none}
.progress-pct{font-size:.78rem;font-weight:600;color:rgba(165,148,255,.8);letter-spacing:.04em}
.progress-track{height:4px;background:rgba(255,255,255,.08);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#6456D4,#9B6EDB);border-radius:100px;transition:width .6s cubic-bezier(.25,.46,.45,.94)}
.extent-header{font-family:var(--body);font-size:1.6rem;font-weight:600;text-align:center;color:var(--text);margin:0 0 .15rem;flex-shrink:0}
.extent-header.hidden{display:none}
.extent-header.first-load{opacity:0;animation:fadeIn .4s ease .5s forwards}
.slide-area{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:15%}
.content-anchor{position:relative}
.text-section{position:absolute;bottom:100%;left:0;right:0;padding-bottom:.5rem}
.scale-section{}
.question-slide{overflow:hidden}
.question-slide.first-load{opacity:0;animation:fadeIn .4s ease 1s forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInRight{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-80px);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-fwd{animation:slideInRight .25s ease}
.slide-bwd{animation:slideInLeft .25s ease}
.item-question{font-family:var(--body);font-size:1.1rem;font-weight:500;line-height:1.5;color:var(--text);text-align:center;margin-bottom:.75rem;text-wrap:balance}
.item-question-special{font-family:var(--body);font-size:.95rem;font-weight:400;line-height:1.5;color:var(--text-muted);text-align:center;margin-bottom:.35rem;font-style:italic;text-wrap:balance}
.item-question-special-main{font-family:var(--body);font-size:1.1rem;font-weight:500;line-height:1.5;color:var(--text);text-align:center;margin-bottom:.75rem;text-wrap:balance}
.scale-wrap{display:flex;flex-direction:column;gap:6px;max-width:400px;margin:0 auto;width:100%}
.scale-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:.7rem 1.25rem;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-card);cursor:pointer;transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent;user-select:none;position:relative;overflow:hidden;z-index:0}
.scale-btn::before{content:'';position:absolute;top:0;left:0;height:100%;width:0;z-index:-1;border-radius:inherit;transition:width .4s cubic-bezier(.25,.46,.45,.94)}
.scale-btn[data-value="0"]::before{background:rgba(100,86,212,.15)}
.scale-btn[data-value="1"]::before{background:linear-gradient(90deg,rgba(100,86,212,.1),rgba(100,86,212,.25))}
.scale-btn[data-value="2"]::before{background:linear-gradient(90deg,rgba(100,86,212,.1),rgba(100,86,212,.35))}
.scale-btn[data-value="3"]::before{background:linear-gradient(90deg,rgba(100,86,212,.1),rgba(100,86,212,.45))}
.scale-btn[data-value="4"]::before{background:linear-gradient(90deg,rgba(100,86,212,.1),rgba(100,86,212,.55))}
@media (hover:hover){.scale-btn:hover{border-color:rgba(165,148,255,.4);background:rgba(255,255,255,.04)}}
.scale-btn.selected{border-color:rgba(224,184,96,.5);background:var(--bg-card)}
.scale-btn.selected[data-value="0"]::before{width:2%}
.scale-btn.selected[data-value="1"]::before{width:25%}
.scale-btn.selected[data-value="2"]::before{width:50%}
.scale-btn.selected[data-value="3"]::before{width:75%}
.scale-btn.selected[data-value="4"]::before{width:100%}
.scale-num{font-weight:600;font-size:.95rem;color:var(--text);transition:color .15s}
.scale-lbl{font-size:.95rem;font-weight:400;color:var(--text-muted);line-height:1.3;transition:color .15s}
.scale-btn.selected .scale-num{color:#E8C870}
.scale-btn.selected .scale-lbl{color:#C8A850}
.nav-row{display:flex;justify-content:space-between;align-items:center;padding:1rem 0 1.5rem;flex-shrink:0;gap:1rem;border-top:1px solid var(--border-light)}
.btn-nav{font-family:var(--body);font-size:.92rem;font-weight:600;padding:.8rem 2rem;border-radius:100px;cursor:pointer;border:none;transition:all .15s ease}
.btn-next{background:linear-gradient(135deg,#6456D4 0%,#5046C0 100%);color:#fff;box-shadow:0 0 0 1px rgba(100,86,212,.4),0 2px 12px rgba(91,77,199,.4)}
.btn-next:hover{background:linear-gradient(135deg,#7063DC 0%,#5B50CC 100%);transform:translateY(-1px);box-shadow:0 0 0 1px rgba(112,99,220,.5),0 4px 18px rgba(91,77,199,.5)}.btn-next:active{transform:translateY(0)}
.btn-back{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-back:hover{background:rgba(255,255,255,.05);color:var(--text);border-color:rgba(255,255,255,.2)}
.error-msg{background:var(--error-bg);color:var(--error);padding:.65rem 1rem;border-radius:var(--radius);font-size:.82rem;font-weight:500;margin-bottom:.5rem;display:none;border:1px solid rgba(248,113,113,.2);text-align:center}
.error-msg.visible{display:block}
.results{max-width:640px;margin:0 auto;padding:2.5rem 1.5rem 4rem;animation:fadeIn .5s ease}
.results h1{font-family:var(--heading);font-size:2rem;font-weight:700;text-align:center;margin-bottom:.5rem;color:var(--text)}
.results-sub{text-align:center;font-size:1rem;color:var(--text-muted);font-weight:300;margin-bottom:2.5rem;line-height:1.6}
.dim-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem 1.75rem;margin-bottom:.85rem;box-shadow:var(--shadow-sm)}
.dim-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.dim-name{font-family:var(--heading);font-size:1.05rem;font-weight:600}
.dim-pct{font-size:1.05rem;font-weight:700;color:var(--primary)}
.dim-desc{font-size:.78rem;color:var(--text-muted);line-height:1.5;margin-bottom:.85rem}
.dim-bar-track{height:6px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:100px;transition:width 1.2s cubic-bezier(.25,.46,.45,.94)}
.dim-bar-fd{background:linear-gradient(90deg,#5B4DC7,#7B6FE0)}
.dim-bar-im{background:linear-gradient(90deg,#E8567F,#F08BA5)}
.dim-bar-cr{background:linear-gradient(90deg,#8B5CF6,#A78BFA)}
.dim-bar-iss{background:linear-gradient(90deg,#D97B2B,#F0A854)}
.dim-bar-iu{background:linear-gradient(90deg,#0EA5E9,#67D4F8)}
.dim-bar-as{background:linear-gradient(90deg,#DC2626,#F87171)}
.submitting-overlay{display:none;position:fixed;inset:0;background:rgba(12,18,32,.92);backdrop-filter:blur(8px);z-index:1000;align-items:center;justify-content:center;flex-direction:column}
.submitting-overlay.visible{display:flex}
.spinner{width:40px;height:40px;border:2px solid rgba(255,255,255,.1);border-top-color:rgba(165,148,255,.8);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{margin-top:1rem;color:var(--text-muted);font-size:.9rem;font-weight:400;letter-spacing:.04em}
@media(max-width:640px){
  .hero{padding:1.5rem 1.25rem}
  .hero h1{white-space:nowrap}.hero-sub{font-size:1rem}
  .hero-eyebrow{font-size:.68rem;margin-bottom:1.2rem}
  .hero-rule{margin-bottom:1.2rem}
  .hero-meta{flex-direction:column;gap:0;border-radius:16px;padding:.25rem 0;margin:1.75rem 0 2.25rem}
  .hero-meta-item{padding:.5rem 1.25rem;width:100%;justify-content:center}
  .hero-meta-item+.hero-meta-item{border-left:none;border-top:1px solid rgba(255,255,255,.08)}
  .btn-hero{padding:.9rem 2.2rem;font-size:.95rem;width:100%;max-width:320px}
  .survey-shell{padding:0 .75rem 0}
  .extent-header{font-size:1.4rem}
  .item-question{font-size:1.05rem}
  .scale-btn{padding:.6rem 1rem}
  .scale-num{font-size:.88rem}.scale-lbl{font-size:.88rem}
  .btn-nav{padding:.7rem 1.5rem;font-size:.85rem}
  .explainer{padding:1.5rem 1.25rem}
  .explainer-card{padding:1.75rem 1.25rem}
  .tri-num{width:30px;height:30px;font-size:.78rem}
  .results{padding:1.5rem 1rem 3rem}
  .results h1{font-size:1.6rem}
  .dim-card{padding:1.1rem .9rem}.dim-name{font-size:.95rem}
}
@media(max-width:380px){
  .hero h1{font-size:1.6rem}
  .extent-header{font-size:1.2rem}
  .item-question{font-size:.95rem}
  .scale-btn{padding:.5rem .75rem}
  .scale-lbl{font-size:.82rem}
  .tri-num{width:26px;height:26px;font-size:.72rem}
}

/* Likert colors */
.likert .scale-btn::before{display:none}
.likert .scale-btn.selected[data-value="0"]{border-color:rgba(248,113,113,.5);background:rgba(220,38,38,.12)}
.likert .scale-btn.selected[data-value="0"] .scale-num,.likert .scale-btn.selected[data-value="0"] .scale-lbl{color:#F87171}
.likert .scale-btn.selected[data-value="1"]{border-color:rgba(232,92,92,.4);background:rgba(232,92,92,.1)}
.likert .scale-btn.selected[data-value="1"] .scale-num,.likert .scale-btn.selected[data-value="1"] .scale-lbl{color:#F08080}
.likert .scale-btn.selected[data-value="2"]{border-color:rgba(240,144,48,.4);background:rgba(240,144,48,.1)}
.likert .scale-btn.selected[data-value="2"] .scale-num,.likert .scale-btn.selected[data-value="2"] .scale-lbl{color:#F0A858}
.likert .scale-btn.selected[data-value="3"]{border-color:rgba(107,191,107,.4);background:rgba(107,191,107,.1)}
.likert .scale-btn.selected[data-value="3"] .scale-num,.likert .scale-btn.selected[data-value="3"] .scale-lbl{color:#6BBF6B}
.likert .scale-btn.selected[data-value="4"]{border-color:rgba(34,168,34,.4);background:rgba(34,168,34,.12)}
.likert .scale-btn.selected[data-value="4"] .scale-num,.likert .scale-btn.selected[data-value="4"] .scale-lbl{color:#4ACA4A}

function calcScores(){
  var scores={},counts={};
  CORE_FACTORS.forEach(function(f){scores[f]=0;counts[f]=0});
  S1_ITEMS.forEach(function(item){
    if(CORE_FACTORS.indexOf(item.factor)===-1)return;
    var raw=state.responses[item.id];if(raw===undefined)return;
    scores[item.factor]+=raw;counts[item.factor]++;
  });
  var pcts={},raws={},maxes={};
  CORE_FACTORS.forEach(function(f){
    pcts[f]=counts[f]>0?Math.round((scores[f]/(counts[f]*4))*100):0;
    raws[f]=scores[f];
    // Max possible = (number of items for this factor) * 4 (max per item on 0-4 scale)
    maxes[f]=FACTOR_ITEM_COUNTS[f]*4;
  });
  return {pcts:pcts,raws:raws,maxes:maxes};
}

function calcRawFactor(key){

  S1_ITEMS.forEach(function(item){
    if(item.factor!==key)return;
    var v=state.responses[item.id];
    if(v!==undefined)sum+=v;

}
function calcPsychTotal(){
  // Raw sum across all 27 items (max 108)
  var sum=0;
  CORE_FACTORS.forEach(function(f){sum+=calcRawFactor(f)});
  return sum;
}
function percentileOf(sortedArr,score){
  // STRICT % below: returns raw % of sample with score strictly LESS than user's.
  // No half-credit for ties — being tied with someone is not "higher than" them.
  // So min score → 0%, max score → ~100%.
  var n=sortedArr.length,below=0;
  for(var i=0;i<n;i++){
    if(sortedArr[i]<score)below++;
    else break;
  }
  return (below/n)*100;
}
function gaussKDE(data,bw,x){
  var sum=0,n=data.length;
  for(var i=0;i<n;i++){var u=(x-data[i])/bw;sum+=Math.exp(-0.5*u*u)}
  return sum/(n*bw*Math.sqrt(2*Math.PI));
}
function buildChartSVG(opts){
  // opts: {bins, edges, maxX, userScore, fillColor, rawData, std, xLabelStep}
  // edges define non-uniform bin boundaries (edges[i] to edges[i+1] = bin i)
  var bins=opts.bins,edges=opts.edges,maxX=opts.maxX,userScore=opts.userScore,fill=opts.fillColor;
  var W=420,H=240,padL=42,padR=14,padT=12,padB=46;
  var plotW=W-padL-padR,plotH=H-padT-padB;
  var maxCount=Math.max.apply(null,bins);
  var yMax=Math.ceil(maxCount/50)*50;
  if(yMax<maxCount)yMax=maxCount;
  if(yMax===0)yMax=10;
  var svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">';
  // Y-axis grid + labels
  var nTicks=4;
  for(var t=0;t<=nTicks;t++){
    var yVal=Math.round((yMax/nTicks)*t);
    var yPos=padT+plotH-(yVal/yMax)*plotH;
    svg+='<line x1="'+padL+'" y1="'+yPos+'" x2="'+(W-padR)+'" y2="'+yPos+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    svg+='<text x="'+(padL-6)+'" y="'+(yPos+3.5)+'" text-anchor="end" font-size="10" fill="rgba(180,175,210,0.65)" font-family="Source Sans 3,sans-serif">'+yVal+'</text>';
  }
  // Bars uniform pixel-width, centered at each bin's center on the x-axis
  var nBins=bins.length;
  // Use modal bin width to determine bar pixel width (so all bars look same thickness)
  var widths={};
  for(var ii=0;ii<nBins;ii++){var w=edges[ii+1]-edges[ii];widths[w]=(widths[w]||0)+1}
  var modalW=2;var maxFreq=0;
  for(var w2 in widths){if(widths[w2]>maxFreq){maxFreq=widths[w2];modalW=parseFloat(w2)}}
  var barPixWidth=(modalW/maxX)*plotW*0.78;
  for(var i=0;i<nBins;i++){
    var loEdge=edges[i],hiEdge=edges[i+1];
    var binCenter=(loEdge+hiEdge)/2;
    var centerX=padL+(binCenter/maxX)*plotW;
    var x=centerX-barPixWidth/2;
    var cnt=bins[i],h=(cnt/yMax)*plotH;
    var y=padT+plotH-h;
    svg+='<rect x="'+x.toFixed(2)+'" y="'+y.toFixed(2)+'" width="'+barPixWidth.toFixed(2)+'" height="'+h.toFixed(2)+'" fill="'+fill+'" fill-opacity="0.55" rx="1"/>';
  }
  // KDE curve overlay (uses modalW computed above for bar widths)
  if(opts.rawData&&opts.std){
    var nPts=opts.rawData.length;
    var bw=1.06*opts.std*Math.pow(nPts,-0.2);
    var samples=140;
    var path='';
    for(var p=0;p<=samples;p++){
      var xv=(p/samples)*maxX;
      var density=gaussKDE(opts.rawData,bw,xv);
      var countEst=density*nPts*modalW;
      var yPx=padT+plotH-(countEst/yMax)*plotH;
      var xPx=padL+(xv/maxX)*plotW;
      path+=(p===0?'M':'L')+xPx.toFixed(2)+' '+yPx.toFixed(2)+' ';
    }
    svg+='<path d="'+path+'" stroke="rgba(255,255,255,0.95)" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>';
  }
  // X-axis baseline
  svg+='<line x1="'+padL+'" y1="'+(padT+plotH)+'" x2="'+(W-padR)+'" y2="'+(padT+plotH)+'" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>';
  // X-axis labels
  var step=opts.xLabelStep||4;
  for(var xv2=0;xv2<=maxX;xv2+=step){
    var xPos=padL+(xv2/maxX)*plotW;
    svg+='<line x1="'+xPos+'" y1="'+(padT+plotH)+'" x2="'+xPos+'" y2="'+(padT+plotH+4)+'" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>';
    svg+='<text x="'+xPos+'" y="'+(padT+plotH+15)+'" text-anchor="middle" font-size="10" fill="rgba(180,175,210,0.7)" font-family="Source Sans 3,sans-serif">'+xv2+'</text>';
  }
  // User indicator
  var clampedScore=Math.max(0,Math.min(maxX,userScore));
  var arrowX=padL+(clampedScore/maxX)*plotW;
  svg+='<line x1="'+arrowX+'" y1="'+padT+'" x2="'+arrowX+'" y2="'+(padT+plotH)+'" stroke="#E8B860" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.75"/>';
  var ay=padT+plotH+22;
  svg+='<polygon points="'+arrowX+','+ay+' '+(arrowX-6)+','+(ay+9)+' '+(arrowX+6)+','+(ay+9)+'" fill="#E8B860"/>';
  svg+='<text x="'+arrowX+'" y="'+(ay+22)+'" text-anchor="middle" font-size="10" font-weight="600" fill="#E8B860" font-family="Source Sans 3,sans-serif">YOU</text>';
  svg+='</svg>';
  return svg;
}
function pctPhrase(rawPct){
  // Always numeric. 0% is a valid output (means everyone scored same or higher).
  // Cap to >99% to avoid the "100%" awkwardness for max scorers.
  var label;
  if(rawPct>=99.5)label='&gt;99%';
  else label=Math.round(rawPct)+'%';
  return 'Your score is <b>higher</b> than <span class="chart-pct">'+label+'</span> of people who took this test';
}
function pctPhraseLower(rawPct){
  // Mirror image of pctPhrase: convert "higher than X%" to "lower than (100-X)%".
  // Used for symmetric (no-floor-effect) scales when the user's percentile is below 50,
  // because "lower than 75%" reads more naturally than "higher than 25%".
  var inv=100-rawPct;
  var label;
  if(inv>=99.5)label='&gt;99%';
  else label=Math.round(inv)+'%';
  return 'Your score is <b>lower</b> than <span class="chart-pct">'+label+'</span> of people who took this test';
}

function buildCorrDiagramSVG(){
  // Correlated four-factor: square layout
  // Top-left: F1 (Interpersonal Style); Top-right: F3 (Lifestyle)
  // Bottom-left: F2 (Affective); Bottom-right: F4 (Antisocial)
  // Covariances:
  // F1<->F3 = 0.358 (top edge)
  // F3<->F4 = 0.412 (right edge)
  // F2<->F4 = 0.314 (bottom edge)
  // F1<->F2 = 0.340 (left edge)
  // F1<->F4 = 0.270 (diagonal TL-BR)
  // F2<->F3 = 0.399 (diagonal BL-TR)
  var W=700,H=560;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" style="font-family:var(--body),sans-serif">';
  svg+='<defs><marker id="arrCstart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M10,0 L0,5 L10,10 z" fill="#A78BFA"/></marker><marker id="arrCend" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#A78BFA"/></marker></defs>';
  // Bubble dimensions
  var rx=110,ry=46;
  // Centres for square layout
  var TLx=170,TLy=110;   // top-left  : F1 Charming/Deceitful
  var TRx=530,TRy=110;   // top-right : F3 Lifestyle
  var BLx=170,BLy=440;   // bottom-left: F2 Affective
  var BRx=530,BRy=440;   // bottom-right: F4 Antisocial
  // Helper to draw a bubble
  function bubble(cx,cy,line1,line2){
    var s='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="rgba(155,141,255,0.12)" stroke="#9B8BFF" stroke-width="1.5"/>';
    s+='<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="13" font-weight="600" fill="#E8E4F4">'+line1+'</text>';
    s+='<text x="'+cx+'" y="'+(cy+14)+'" text-anchor="middle" font-size="13" font-weight="600" fill="#E8E4F4">'+line2+'</text>';
    return s;
  }
  // Helper for double-headed line ending exactly at ellipse perimeters
  // Approximate ellipse boundary with point on the line at distance equal to ellipse-radius along the line direction.
  function ellipsePoint(cx,cy,tx,ty){
    var dx=tx-cx,dy=ty-cy;
    // parametric: scale (dx/rx)^2 + (dy/ry)^2 = 1 along ray
    var s=1/Math.sqrt((dx*dx)/(rx*rx)+(dy*dy)/(ry*ry));
    return {x:cx+dx*s,y:cy+dy*s};
  }
  function doubleArrow(c1x,c1y,c2x,c2y,label,labelOffsetX,labelOffsetY){
    var p1=ellipsePoint(c1x,c1y,c2x,c2y);
    var p2=ellipsePoint(c2x,c2y,c1x,c1y);
    // small inset so arrowheads sit on perimeter
    var s='<line x1="'+p1.x.toFixed(1)+'" y1="'+p1.y.toFixed(1)+'" x2="'+p2.x.toFixed(1)+'" y2="'+p2.y.toFixed(1)+'" stroke="#A78BFA" stroke-width="1.5" marker-start="url(#arrCstart)" marker-end="url(#arrCend)"/>';
    var mx=(p1.x+p2.x)/2+(labelOffsetX||0);
    var my=(p1.y+p2.y)/2+(labelOffsetY||0);
    s+='<rect x="'+(mx-22)+'" y="'+(my-11)+'" width="44" height="18" fill="#131929" stroke="rgba(167,139,250,.4)" stroke-width="1" rx="4"/>';
    s+='<text x="'+mx+'" y="'+(my+3)+'" text-anchor="middle" font-size="12" font-weight="600" fill="#E8B860">'+label+'</text>';
    return s;
  }
  // Draw diagonals first (so they sit behind bubbles in z order)
  svg+=doubleArrow(TLx,TLy,BRx,BRy,'0.292',-30,0);  // F1 <-> F4
  svg+=doubleArrow(BLx,BLy,TRx,TRy,'0.398',30,0);   // F2 <-> F3
  // Edges
  svg+=doubleArrow(TLx,TLy,TRx,TRy,'0.379',0,-12);  // F1 <-> F3 (top)
  svg+=doubleArrow(TRx,TRy,BRx,BRy,'0.413',12,0);   // F3 <-> F4 (right)
  svg+=doubleArrow(BLx,BLy,BRx,BRy,'0.315',0,12);   // F2 <-> F4 (bottom)
  svg+=doubleArrow(TLx,TLy,BLx,BLy,'0.369',-12,0);  // F1 <-> F2 (left)
  // Bubbles on top
  svg+=bubble(TLx,TLy,'Charming &amp;','Deceitful');
  svg+=bubble(TRx,TRy,'Impulsive,','Aimless Lifestyle');
  svg+=bubble(BLx,BLy,'Deficient','Affective Exp.');
  svg+=bubble(BRx,BRy,'Reactive','Aggression');
  // Footnote
  svg+='<text x="'+(W/2)+'" y="'+(H-14)+'" text-anchor="middle" font-size="11" fill="rgba(180,175,210,0.7)" font-style="italic">Standardised factor covariances shown on each path. Estimator: WLSMV.</text>';
  svg+='</svg>';
  return svg;
}

// Graded Response Model: P(Y >= k) = sigmoid(a*(theta - b_{k-1}))
function sigmoid(x){return 1/(1+Math.exp(-x))}
function grmCategoryProbs(theta,a,bs){
  // bs = [b1, b2, b3, b4] for 5-category response
  var psum=[1];
  for(var k=0;k<bs.length;k++){psum.push(sigmoid(a*(theta-bs[k])))}
  psum.push(0);
  // P(Y=k) = P(Y>=k) - P(Y>=k+1)
  var probs=[];
  for(var i=0;i<5;i++)probs.push(psum[i]-psum[i+1]);
  return probs;
}

function buildICCSVG(item){
  // Plot 5 category response curves over theta in [-5, 5]
  var W=400,H=200,padL=38,padR=12,padT=12,padB=36;
  var plotW=W-padL-padR,plotH=H-padT-padB;
  var thetaMin=-5,thetaMax=5;
  var colors=['#7B6FE0','#A78BFA','#5DCFD9','#F0A854','#F87171']; // categories 0..4 mapped to Y=1..5
  var labels=['No extent','Slight','Moderate','Considerable','Complete'];
  var samples=80;
  var bs=[item.b1,item.b2,item.b3,item.b4];
  // Pre-compute curves
  var curves=[[],[],[],[],[]];
  for(var s=0;s<=samples;s++){
    var theta=thetaMin+(thetaMax-thetaMin)*(s/samples);
    var probs=grmCategoryProbs(theta,item.a,bs);
    var xPx=padL+((theta-thetaMin)/(thetaMax-thetaMin))*plotW;
    for(var k=0;k<5;k++){
      var yPx=padT+plotH-probs[k]*plotH;
      curves[k].push({x:xPx,y:yPx});
    }
  }
  var svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">';
  // Y grid
  for(var t=0;t<=4;t++){
    var yVal=t*0.25,yPos=padT+plotH-yVal*plotH;
    svg+='<line x1="'+padL+'" y1="'+yPos+'" x2="'+(W-padR)+'" y2="'+yPos+'" stroke="rgba(255,255,255,0.05)"/>';
    svg+='<text x="'+(padL-6)+'" y="'+(yPos+3)+'" text-anchor="end" font-size="9" fill="rgba(180,175,210,0.6)" font-family="Source Sans 3">'+yVal.toFixed(2)+'</text>';
  }
  // X axis
  svg+='<line x1="'+padL+'" y1="'+(padT+plotH)+'" x2="'+(W-padR)+'" y2="'+(padT+plotH)+'" stroke="rgba(255,255,255,0.25)"/>';
  for(var x=thetaMin;x<=thetaMax;x++){
    var xPos=padL+((x-thetaMin)/(thetaMax-thetaMin))*plotW;
    svg+='<line x1="'+xPos+'" y1="'+(padT+plotH)+'" x2="'+xPos+'" y2="'+(padT+plotH+4)+'" stroke="rgba(255,255,255,0.25)"/>';
    svg+='<text x="'+xPos+'" y="'+(padT+plotH+15)+'" text-anchor="middle" font-size="9" fill="rgba(180,175,210,0.65)" font-family="Source Sans 3">'+x+'</text>';
  }
  // Axis labels
  svg+='<text x="'+(padL+plotW/2)+'" y="'+(H-4)+'" text-anchor="middle" font-size="11" fill="rgba(180,175,210,0.8)" font-family="Cambria, \'Times New Roman\', Georgia, serif" font-style="italic">\u03b8</text>';
  svg+='<text x="10" y="'+(padT+plotH/2)+'" text-anchor="middle" font-size="10" fill="rgba(180,175,210,0.7)" font-family="Source Sans 3" font-style="italic" transform="rotate(-90 10 '+(padT+plotH/2)+')">P(Y = k)</text>';
  // Curves
  for(var k=0;k<5;k++){
    var path='';
    for(var i=0;i<curves[k].length;i++){
      path+=(i===0?'M':'L')+curves[k][i].x.toFixed(2)+' '+curves[k][i].y.toFixed(2)+' ';
    }
    svg+='<path d="'+path+'" stroke="'+colors[k]+'" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round" opacity="0.95"/>';
  }
  svg+='</svg>';
  return svg;
}

  // Peak annotation
  if(peakLabel){
    svg+='<text x="'+(W-padR-6)+'" y="'+(padT+12)+'" text-anchor="end" font-size="10" fill="rgba(220,215,235,0.85)" font-family="Source Sans 3" font-weight="600">'+peakLabel+'</text>';
  }
  svg+='</svg>';
  return svg;
}

function attachListeners(){
  var bs=document.getElementById('btnStart');
  if(bs)bs.addEventListener('click',function(){state.currentPage=1;render()});
  var bc=document.getElementById('btnCompare');
  if(bc)bc.addEventListener('click',function(){state.currentPage=COMPARISON_PAGE;render();window.scrollTo(0,0)});
  var bbr=document.getElementById('btnBackToResults');
  if(bbr)bbr.addEventListener('click',function(){state.currentPage=RESULTS_PAGE;render();window.scrollTo(0,0)});
  var bpsy=document.getElementById('btnPsychometrics');
  if(bpsy)bpsy.addEventListener('click',function(){state.currentPage=PSYCHOMETRICS_PAGE;render();window.scrollTo(0,0)});
  var bbpsy=document.getElementById('btnBackToCompare');
  if(bbpsy)bbpsy.addEventListener('click',function(){state.currentPage=COMPARISON_PAGE;render();window.scrollTo(0,0)});
  var bgcfa=document.getElementById('btnGoCFA');
  if(bgcfa)bgcfa.addEventListener('click',function(){state.currentPage=CFA_PAGE;render();window.scrollTo(0,0)});
  var bgirt=document.getElementById('btnGoIRT');
  if(bgirt)bgirt.addEventListener('click',function(){state.currentPage=IRT_PAGE;render();window.scrollTo(0,0)});
  var bbhub=document.getElementById('btnBackToHub');
  if(bbhub)bbhub.addEventListener('click',function(){state.currentPage=PSYCHOMETRICS_PAGE;render();window.scrollTo(0,0)});
  // CFA tab switching
  document.querySelectorAll('.cfa-tab[data-cfa-tab]').forEach(function(tab){tab.addEventListener('click',function(){
    var which=tab.getAttribute('data-cfa-tab');
    document.querySelectorAll('.cfa-tab[data-cfa-tab]').forEach(function(t){t.classList.toggle('cfa-tab-active',t.getAttribute('data-cfa-tab')===which)});
    document.querySelectorAll('#cfaViewHier,#cfaViewCorr').forEach(function(v){v.classList.remove('cfa-view-active')});
    var target=document.getElementById(which==='hier'?'cfaViewHier':'cfaViewCorr');
    if(target)target.classList.add('cfa-view-active');
  })});
  // IRT tab switching
  document.querySelectorAll('.cfa-tab[data-irt-tab]').forEach(function(tab){tab.addEventListener('click',function(){
    var which=tab.getAttribute('data-irt-tab');
    document.querySelectorAll('.cfa-tab[data-irt-tab]').forEach(function(t){t.classList.toggle('cfa-tab-active',t.getAttribute('data-irt-tab')===which)});
    document.querySelectorAll('#irtViewICC,#irtViewTIF').forEach(function(v){v.classList.remove('cfa-view-active')});
    var target=document.getElementById(which==='icc'?'irtViewICC':'irtViewTIF');
    if(target)target.classList.add('cfa-view-active');
    window.scrollTo(0,0);
  })});
  var bg=document.getElementById('btnGotIt');
  if(bg)bg.addEventListener('click',function(){state.slideDir='fwd';if(!state.startTime)state.startTime=Date.now();state.pageStartTimes[ITEM_START]=Date.now();state.currentPage=ITEM_START;render()});
  var beb=document.getElementById('btnExplainerBack');
  if(beb)beb.addEventListener('click',function(){state.slideDir='bwd';state.currentPage=0;render()});
  var bds=document.getElementById('btnDemoSubmit');
  if(bds)bds.addEventListener('click',function(){submitFinal()});
  var demoAge=document.getElementById('demoAge');
  var demoCountry=document.getElementById('demoCountry');
  if(demoAge)demoAge.addEventListener('input',function(){var e=document.getElementById('demoError');if(e)e.classList.remove('visible')});
  if(demoCountry)demoCountry.addEventListener('change',function(){var e=document.getElementById('demoError');if(e)e.classList.remove('visible')});
  var dg=document.getElementById('demoGender');if(dg)dg.addEventListener('change',function(){var e=document.getElementById('demoError');if(e)e.classList.remove('visible')});
  var bb=document.getElementById('btnBack');
  if(bb)bb.addEventListener('click',function(){
    recordPageTime();state.slideDir='bwd';
    if(state.currentPage===ITEM_START){state.currentPage=1;render();return}
    if(state.currentPage===DEMOGRAPHICS_PAGE){state.currentPage=DEMOGRAPHICS_PAGE-1;state.pageStartTimes[state.currentPage]=Date.now();render();return}
    state.currentPage--;state.pageStartTimes[state.currentPage]=Date.now();render();
  });
  var bn=document.getElementById('btnNext');
  if(bn)bn.addEventListener('click',function(){
    var p=state.currentPage;
    // Section 1 items (the only test section)
    if(p>=ITEM_START&&p<DEMOGRAPHICS_PAGE){
      if(!validateItem(p-ITEM_START,S1_ITEMS))return;
      if(p===DEMOGRAPHICS_PAGE-1){recordPageTime();submitSection1();return}
    }
    recordPageTime();state.slideDir='fwd';state.currentPage++;state.pageStartTimes[state.currentPage]=Date.now();render();
  });
  document.querySelectorAll('.scale-btn').forEach(function(opt){
    opt.addEventListener('click',function(){
      var itemId=opt.dataset.item,value=parseInt(opt.dataset.value);
      if(state.responses[itemId]===value){delete state.responses[itemId];opt.classList.remove('selected');return}
      state.responses[itemId]=value;
      document.querySelectorAll('.scale-btn[data-item="'+itemId+'"]').forEach(function(o){o.classList.remove('selected')});
      opt.classList.add('selected');
      var err=document.getElementById('itemError');if(err)err.classList.remove('visible');
    });
  });
}

function recordPageTime(){var st=state.pageStartTimes[state.currentPage];if(st)state.pageTimes[state.currentPage]=Math.round((Date.now()-st)/100)/10;state.pageStartTimes[state.currentPage]=Date.now()}

function validateItem(idx,items){
  var item=items[idx];
  if(state.responses[item.id]===undefined){
    var err=document.getElementById('itemError');
    if(err){err.textContent='Please answer before continuing.';err.classList.add('visible')}
    return false;
  }
  return true;
}

function buildPayload(items,section){
  var totalTime=Math.round((Date.now()-state.startTime)/100)/10;
  var itemTimes={};
  var startPage=ITEM_START;
  items.forEach(function(item,i){itemTimes[item.id]=state.pageTimes[startPage+i]||0});
  var responses={};
  items.forEach(function(item){if(state.responses[item.id]!==undefined)responses[item.id]=state.responses[item.id]});
  return {respondent_id:state.respondentId,section:section,total_time_seconds:totalTime,ip_address:state.ipData.ip||'',ip_country:state.ipData.country||'',ip_city:state.ipData.city||'',isp:state.ipData.isp||'',is_vpn_or_proxy:state.ipData.is_vpn?'YES':'NO',responses:responses,item_times:itemTimes};
}

function submitToSheet(payload,callback){
  if(!GOOGLE_SCRIPT_URL||GOOGLE_SCRIPT_URL==='YOUR_GOOGLE_SCRIPT_URL_HERE'){callback();return}
  try{
    var iframe=document.createElement('iframe');iframe.name='sf_'+Date.now();iframe.style.display='none';document.body.appendChild(iframe);
    var form=document.createElement('form');form.method='POST';form.action=GOOGLE_SCRIPT_URL;form.target=iframe.name;form.style.display='none';
    var input=document.createElement('input');input.type='hidden';input.name='payload';input.value=JSON.stringify(payload);
    form.appendChild(input);document.body.appendChild(form);form.submit();
    setTimeout(function(){try{document.body.removeChild(form);document.body.removeChild(iframe)}catch(e){}callback()},2000);
  }catch(err){callback()}
}

// Order in which response columns appear in the Google Sheet.
// Validity items (VAL prefix) are appended at the end.
var FACET_ORDER=['GLIB','LIE','EMPATHY','REMORSE','IMPULSIVE','IRRESPONSIBLE','LACKSGOALS','POOR','ADULT'];
function _idPrefix(id){var m=id.match(/^[A-Z]+/);return m?m[0]:id}
function _idNum(id){var m=id.match(/(\d+)$/);return m?parseInt(m[1],10):0}
function buildOrderedPayload(section,demos){
  // total_time_seconds = first item shown -> last item answered. Excludes demographics.
  var totalTime=(state.s1EndTime&&state.startTime)?Math.round((state.s1EndTime-state.startTime)/100)/10:0;
  var p={};
  p.timestamp=new Date().toISOString();
  p.respondent_id=state.respondentId;
  p.section=section;
  p.total_time_seconds=totalTime;
  p.ip_address=state.ipData.ip||'';
  p.ip_country=state.ipData.country||'';
  p.ip_city=state.ipData.city||'';
  p.isp=state.ipData.isp||'';
  p.is_vpn_or_proxy=state.ipData.is_vpn?'YES':'NO';
  p.demo_age=demos&&demos.age!==undefined?demos.age:'';
  p.demo_gender=demos?demos.gender||'':'';
  p.demo_country=demos?demos.country||'':'';
  p.demo_accurate=demos?demos.accurate||'':'';
  p.demo_consent=demos?demos.consent||'':'';
  // Response columns: grouped by facet (GLIB, GRANDIOSE, ...), numeric within each
  for(var fi=0;fi<FACET_ORDER.length;fi++){
    var prefix=FACET_ORDER[fi];
    var group=S1_ITEMS.filter(function(it){return _idPrefix(it.id)===prefix});
    group.sort(function(a,b){return _idNum(a.id)-_idNum(b.id)});
    group.forEach(function(it){p[it.id]=state.responses[it.id]!==undefined?state.responses[it.id]:''});
  }
  // Time columns: in TEST ORDER (not facet-grouped), prefixed with 'Time'
  S1_ITEMS.forEach(function(item,i){p['Time'+item.id]=state.pageTimes[ITEM_START+i]||0});
  p.auth_token=generateToken(state.respondentId);
  return p;
}
function submitSection1(){
  // Capture end-of-test time so total_time_seconds reflects time-on-test only.
  if(!state.s1EndTime)state.s1EndTime=Date.now();
  state.slideDir='fwd';
  state.currentPage=DEMOGRAPHICS_PAGE;
  state.pageStartTimes[DEMOGRAPHICS_PAGE]=Date.now();
  render();
}

function submitFinal(){
  var ageEl=document.getElementById('demoAge');
  var genderEl=document.getElementById('demoGender');
  var countryEl=document.getElementById('demoCountry');
  var accurateEl=document.getElementById('demoAccurate');
  var consentEl=document.getElementById('demoConsent');
  var age=ageEl?ageEl.value.trim():'';
  var gender=genderEl?genderEl.value:'';
  var country=countryEl?countryEl.value:'';
  // Optional checkboxes - send YES/NO based on checked state (always a value, never blank)
  var accurate=(accurateEl&&accurateEl.checked)?'YES':'NO';
  var consent=(consentEl&&consentEl.checked)?'YES':'NO';
  var errEl=document.getElementById('demoError');
  if(!age||isNaN(parseInt(age))||parseInt(age)<13||parseInt(age)>120){
    if(errEl){errEl.textContent='Please enter a valid age (13\u2013120).';errEl.classList.add('visible')}return;
  }
  if(!gender){
    if(errEl){errEl.textContent='Please select your gender.';errEl.classList.add('visible')}return;
  }
  if(!country){
    if(errEl){errEl.textContent='Please select your country.';errEl.classList.add('visible')}return;
  }
  if(errEl)errEl.classList.remove('visible');
  var overlay=document.getElementById('submitting');
  document.getElementById('spinnerText').textContent='Calculating scores\u2026';
  overlay.classList.add('visible');
  var payload=buildOrderedPayload('complete',{age:parseInt(age),gender:gender,country:country,accurate:accurate,consent:consent});
  submitToSheet(payload,function(){
    overlay.classList.remove('visible');
    state.currentPage=RESULTS_PAGE;
    render();
  });
}



// Enter advances to the next page. Skip textareas; let already-focused buttons handle Enter natively.
document.addEventListener('keydown',function(e){
  if(e.key!=='Enter'||e.shiftKey||e.ctrlKey||e.metaKey||e.altKey)return;
  var tag=(e.target&&e.target.tagName)||'';
  if(tag==='TEXTAREA')return;
  if(tag==='BUTTON')return;
  var primaryIds=['btnStart','btnGotIt','btnNext','btnDemoSubmit'];
  for(var i=0;i<primaryIds.length;i++){
    var btn=document.getElementById(primaryIds[i]);
    if(btn){e.preventDefault();btn.click();return}
  }
});

render();
</script>
